name: Meteo Cron - Actualizare alerte orar

on:
  schedule:
    # Ruleaza la fiecare ora, minut 5 (ex: 06:05, 07:05, ...) — evita minutul 0 pt fiabilitate GitHub
    - cron: "5 * * * *"
  workflow_dispatch: # permite rulare manuala din GitHub Actions UI

jobs:
  trigger-meteo-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verifica CRON_SECRET configurat
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET nu e setat in GitHub Repository Secrets. Seteaza-l la https://github.com/RolandPetrila/Livada/settings/secrets/actions (aceeasi valoare ca in Vercel env vars)."
            exit 1
          fi
      - name: Trigger meteo-cron pe Vercel
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -s --max-time 25 -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://livada-mea-psi.vercel.app/api/meteo-cron")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" = "401" ]; then
            echo "::error::401 Neautorizat — CRON_SECRET din GitHub nu se potriveste cu Vercel. Regenereaza si sincronizeaza ambele."
            exit 1
          fi
          if [ "$http_code" -ne 200 ]; then
            echo "::error::Meteo cron failed cu status $http_code (Redis sau alta eroare critica — verifica Vercel logs)"
            exit 1
          fi
          # 200 cu cached:true = Open-Meteo indisponibil temporar, nu o eroare critica.
          # Dashboard-ul continua sa afiseze datele din ultimul run reusit.
          # Badge-ul "Cron stale" din UI apare automat dupa 2+ ore fara date noi.
          if echo "$body" | grep -q '"cached":true'; then
            echo "::warning::Open-Meteo indisponibil temporar — date din ultimul run reusit. Nicio actiune necesara."
          fi
